services:
  web:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
  worker:
    build: .
    command: python -m app.services.redis.main
    env_file:
      - .env
    depends_on:
      - redis
  migrations:
    build: .
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
      
  redis:
    image: redis
    ports:
      - "6379:6379"
  db:
    image: postgres:18
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
